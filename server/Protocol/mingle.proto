syntax = "proto3";
package mingle.protocol;

message AuthRequest {
  string mnemonic = 1;
}

message MeRequest {
  string token = 1;
}

message PingRequest {
  int64 unix_time_ms = 1;
}

message ProfileGetRequest {
  string token = 1;
}

message ProfileUpdateRequest {
  string token = 1;
  string display_name = 2;
  string username = 3;
}

message AuthSuccess {
  string access_token = 1;
  string user_id = 2;
}

message MeSuccess {
  string user_id = 1;
}

message Error {
  string code = 1;
  string message = 2;
}

message Pong {
  int64 unix_time_ms = 1;
}

message ProfileData {
  string user_id = 1;
  string display_name = 2;
  string username = 3;
  int64 last_seen_at_unix_ms = 4;
}

message UserSearchRequest {
  string token = 1;
  string query = 2;
}

message UserSearchResultItem {
  string user_id = 1;
  string display_name = 2;
  string username = 3;
  int64 last_seen_at_unix_ms = 4;
}

message UserSearchResults {
  repeated UserSearchResultItem items = 1;
}

message DialogsListRequest {
  string token = 1;
}

message DialogOpenRequest {
  string token = 1;
  string peer_user_id = 2;
  int64 before_unix_ms = 3;
  uint32 limit = 4;
}

message MessageSendRequest {
  string token = 1;
  string peer_user_id = 2;
  string text = 3;
}

message UserPreview {
  string user_id = 1;
  string display_name = 2;
  string username = 3;
  int64 last_seen_at_unix_ms = 4;
}

message DialogMessage {
  string message_id = 1;
  string dialog_id = 2;
  string sender_user_id = 3;
  string text = 4;
  int64 created_at_unix_ms = 5;
  int64 read_by_recipient_at_unix_ms = 6;
}

message DialogListItem {
  string dialog_id = 1;
  UserPreview peer = 2;
  string last_message_text = 3;
  int64 last_message_at_unix_ms = 4;
  uint32 unread_count = 5;
}

message DialogsData {
  repeated DialogListItem items = 1;
}

message DialogData {
  string dialog_id = 1;
  UserPreview peer = 2;
  repeated DialogMessage messages = 3;
  bool has_more_before = 4;
  int64 oldest_loaded_unix_ms = 5;
}

message MessageSent {
  DialogMessage message = 1;
  UserPreview peer = 2;
}

message SubscribeUpdatesRequest {
  string token = 1;
}

message Subscribed {
  string user_id = 1;
}

message MessageReceived {
  DialogMessage message = 1;
  UserPreview from = 2;
}

message MessageReadUpdate {
  string dialog_id = 1;
  string reader_user_id = 2;
  int64 read_at_unix_ms = 3;
}

message ClientMessage {
  uint32 protocol_version = 1;
  oneof payload {
    AuthRequest register = 2;
    AuthRequest login = 3;
    MeRequest me = 4;
    PingRequest ping = 5;
    ProfileGetRequest profile_get = 6;
    ProfileUpdateRequest profile_update = 7;
    UserSearchRequest user_search = 8;
    DialogsListRequest dialogs_list = 9;
    DialogOpenRequest dialog_open = 10;
    MessageSendRequest message_send = 11;
    SubscribeUpdatesRequest subscribe_updates = 12;
  }
}

message ServerMessage {
  uint32 protocol_version = 1;
  oneof payload {
    AuthSuccess auth_success = 2;
    MeSuccess me_success = 3;
    Error error = 4;
    Pong pong = 5;
    ProfileData profile_data = 6;
    ProfileData profile_updated = 7;
    UserSearchResults user_search_results = 8;
    DialogsData dialogs_data = 9;
    DialogData dialog_data = 10;
    MessageSent message_sent = 11;
    Subscribed subscribed = 12;
    MessageReceived message_received = 13;
    MessageReadUpdate message_read_update = 14;
  }
}
